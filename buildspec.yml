version: 0.2

phases:
  pre_build:
    commands:
      - echo Logging in to DockerHub
      - echo "$DOCKERHUB_TOKEN" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin
      - IMAGE_TAG="${CODEBUILD_RESOLVED_SOURCE_VERSION:-latest}"
  build:
    commands:
      - echo Building backend image
      - docker build -t "$DOCKERHUB_USERNAME/devbank-backend:$IMAGE_TAG" .
      - docker tag "$DOCKERHUB_USERNAME/devbank-backend:$IMAGE_TAG" "$DOCKERHUB_USERNAME/devbank-backend:latest"
  post_build:
    commands:
      - echo Pushing backend image
      - docker push "$DOCKERHUB_USERNAME/devbank-backend:$IMAGE_TAG"
      - docker push "$DOCKERHUB_USERNAME/devbank-backend:latest"
      - printf '[{"name":"devbank-backend","imageUri":"%s"}]' "$DOCKERHUB_USERNAME/devbank-backend:$IMAGE_TAG" > imagedefinitions.json

artifacts:
  files:
    - imagedefinitions.json

